name: PyPI Publish (Trusted Publishing)

# Manual, OIDC-based publish for the standalone packages under packages/.
# No API token: PyPI trusts a pre-configured publisher (this repo + this workflow file +
# the target environment). Start with repository=testpypi, verify, then repository=pypi.
# The 'pypi' environment carries a Required-Reviewer human gate before the irreversible upload.

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package under packages/ to publish
        type: choice
        options:
          - autonomous-audit
          - autonomous-trading
          - autonomous-audit-mcp
        required: true
      repository:
        description: Target index (start with testpypi)
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel + twine check
        run: |
          python -m pip install --upgrade build twine
          python -m build "packages/${{ inputs.package }}" --outdir dist
          python -m twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 'pypi' / 'testpypi' GitHub Environments. Add Required reviewers to 'pypi' = human gate
    # before the irreversible upload (mirrors the desktop-release go/no-go).
    environment: ${{ inputs.repository }}
    permissions:
      id-token: write # OIDC — the whole point of Trusted Publishing (no stored token)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          repository-url: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
