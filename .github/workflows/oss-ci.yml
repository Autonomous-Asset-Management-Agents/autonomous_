name: OSS CI Pipeline

# CI Scope Note:
# This job tests the SNAPSHOT PIPELINE (oss_make_snapshot.sh builds ~/aaagents-public
# from the private Dev-Enviroment workspace, then docker-compose up is run against it).
# This is an integration test of the publisher flow — not the end-user `git clone` experience.
# End-user flow (docker compose up against aaagents-oss directly) is validated by
# the OSS Lock-In Tests which audit the already-snapshotted compose/YAML files.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-oss-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Canonical path for the OSS snapshot directory — used by all steps
      # that reference ~/aaagents-public to avoid hardcoded paths.
      OSS_SNAPSHOT_DIR: /tmp/aaagents-public
      # CI credentials — safe dummy values, no real secrets
      POSTGRES_PASSWORD: "ci-dummy-password"
      REDIS_PASSWORD: "ci-dummy-redis-password"
      # Required by serve_public_api.py fail-fast guard (REQUIRE_SIG check)
      PROXY_ENGINE_SHARED_SECRET: "ci-dummy-shared-secret-32chars!!"
      # Activates Shadow Boot CI bypass in scripts/shadow_boot.py
      # (skips Alpaca + Gemini checks — only Redis is verified)
      IS_CI: "true"
      # Suppress Alpaca 401 noise in CI logs
      ALPACA_API_KEY: "ci-dummy-key"
      ALPACA_SECRET_KEY: "ci-dummy-secret"
      # Required by BotEngine fallback checks when loading RL context
      GEMINI_API_KEY: "ci-dummy-gemini-key"
      # Explicit repo root override for dynamic paths in tests (AAAgents branding, replaces BORA_REPO_ROOT)
      AAA_REPO_ROOT: ${{ github.workspace }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Download Baseline Models (Mock)
      run: |
        mkdir -p data/ml_models
        touch data/ml_models/dummy.pt

    - name: Install Docker Compose
      run: |
        sudo curl -SL "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64" \
          -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Set lowercase org name
      run: echo "ORG_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV


    - name: Install CI dependencies
      run: pip install "detect-secrets==1.5.0"

    - name: Log in to GitHub Container Registry
      # Skipped for fork PRs — GITHUB_TOKEN is read-only for forks and
      # cannot pull private packages. Images must be public for fork CI to work.
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build OSS Snapshot
      run: OSS_SNAPSHOT_DIR="${{ env.OSS_SNAPSHOT_DIR }}" bash scripts/oss_make_snapshot.sh

    - name: Pull and start OSS Stack
      run: |
        cd "${{ env.OSS_SNAPSHOT_DIR }}"
        docker compose -f docker-compose.oss.yml up -d

        echo "Waiting for backend API to be available..."
        for i in {1..30}; do
          if curl -s http://localhost:8001/health | grep -q "status"; then
            echo "Backend is up!"
            break
          fi
          echo "Waiting... $i/30"
          sleep 5
          if [ $i -eq 30 ]; then
            echo "Timeout waiting for backend — dumping logs:"
            docker compose -f docker-compose.oss.yml logs --tail=100
            exit 1
          fi
        done

    - name: "🧪 OSS Lock-In Tests (DSGVO + Network defaults)"
      # These tests are static file audits (read YAML/TS/MD from the repo).
      # They must run on the CI host — not inside the Docker container — so
      # parents[3] path resolution correctly finds the repo root.
      # --noconftest avoids importing backend dependencies (not needed here).
      run: |
        python -m pip install pytest --quiet
        python -m pytest tests/unit/test_oss_dsgvo_network_defaults.py \
               tests/unit/test_oss_compose_defaults.py \
               tests/unit/test_oss_hygiene_defaults.py \
          -v --tb=short --override-ini="addopts=" --noconftest -p no:warnings

    - name: Dump container logs on failure
      if: failure()
      run: |
        if [ -d "${{ env.OSS_SNAPSHOT_DIR }}" ]; then
          cd "${{ env.OSS_SNAPSHOT_DIR }}"
          docker compose -f docker-compose.oss.yml logs --tail=200 || true
        fi

    - name: Stop OSS Stack
      if: always()
      run: |
        if [ -d "${{ env.OSS_SNAPSHOT_DIR }}" ]; then
          cd "${{ env.OSS_SNAPSHOT_DIR }}"
          docker compose -f docker-compose.oss.yml down -v || true
        fi

