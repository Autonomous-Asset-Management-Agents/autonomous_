name: OSS CI Pipeline

# CI Scope Note:
# This job tests the SNAPSHOT PIPELINE (oss_make_snapshot.sh builds ~/aaagents-public
# from the private Dev-Enviroment workspace, then docker-compose up is run against it).
# This is an integration test of the publisher flow — not the end-user `git clone` experience.
# End-user flow (docker compose up against autonomous_ directly) is validated by
# the OSS Lock-In Tests which audit the already-snapshotted compose/YAML files.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-oss-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Canonical path for the OSS snapshot directory — used by all steps
      # that reference ~/aaagents-public to avoid hardcoded paths.
      OSS_SNAPSHOT_DIR: /tmp/aaagents-public
      # CI credentials — safe dummy values, no real secrets
      POSTGRES_PASSWORD: "ci-dummy-password"
      REDIS_PASSWORD: "ci-dummy-redis-password"
      # Required by serve_public_api.py fail-fast guard (REQUIRE_SIG check)
      PROXY_ENGINE_SHARED_SECRET: "ci-dummy-shared-secret-32chars!!"
      # Activates Shadow Boot CI bypass in scripts/shadow_boot.py
      # (skips Alpaca + Gemini checks — only Redis is verified)
      IS_CI: "true"
      # Suppress Alpaca 401 noise in CI logs
      ALPACA_API_KEY: "ci-dummy-key"
      ALPACA_SECRET_KEY: "ci-dummy-secret"
      # Required by BotEngine fallback checks when loading RL context
      GEMINI_API_KEY: "ci-dummy-gemini-key"
      # Explicit repo root override for dynamic paths in tests (AAAgents branding, replaces AAAgents_REPO_ROOT)
      AAA_REPO_ROOT: ${{ github.workspace }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

    - name: Download Baseline Models (Mock)
      run: |
        mkdir -p data/ml_models
        touch data/ml_models/dummy.pt

    - name: Install Docker Compose
      run: |
        sudo curl -SL "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64" \
          -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Set lowercase org name
      run: echo "ORG_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV


    - name: Install CI dependencies
      run: |
        pip install -r requirements-dev.txt

    - name: Pre-Flight Test Check (Fail Fast)
      run: python -m pytest --collect-only tests/

    - name: Log in to GitHub Container Registry
      # Skipped for fork PRs — GITHUB_TOKEN is read-only for forks and
      # cannot pull private packages. Images must be public for fork CI to work.
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build OSS Snapshot
      if: github.repository == 'Autonomous-Asset-Management-Agents/Dev-Enviroment'
      run: OSS_SNAPSHOT_DIR="${{ env.OSS_SNAPSHOT_DIR }}" bash scripts/oss_make_snapshot.sh

    - name: Set Target Stack Directory
      run: |
        if [ "${{ github.repository }}" == "Autonomous-Asset-Management-Agents/Dev-Enviroment" ]; then
          echo "TEST_DIR=${{ env.OSS_SNAPSHOT_DIR }}" >> $GITHUB_ENV
        else
          echo "TEST_DIR=${{ github.workspace }}" >> $GITHUB_ENV
        fi

    - name: Pull and start OSS Stack
      run: |
        cd "${{ env.TEST_DIR }}"
        # Force build from PR source and prevent pulling broken GHCR latest by stripping pull_policy: always
        sed -i 's/pull_policy: always/pull_policy: missing/g' docker-compose.oss.yml
        docker compose -f docker-compose.oss.yml up --build -d

        echo "Waiting for backend API to be available..."
        for i in {1..30}; do
          if curl -s http://localhost:8001/health | grep -q "status"; then
            echo "Backend is up!"
            break
          fi
          echo "Waiting... $i/30"
          sleep 5
          if [ $i -eq 30 ]; then
            echo "Timeout waiting for backend — dumping logs:"
            docker compose -f docker-compose.oss.yml logs --tail=100
            exit 1
          fi
        done

    - name: "🛡️ Compliance Functional Gate (P0 — closes #834)"
      # Detects Finding F04 (DummyAuditLogger). A health check only verifies the API
      # responds — a DummyAuditLogger passes that check too.
      #
      # FIX vs previous version:
      # - Uses `docker compose exec` to check JSONL inside the container (not host FS)
      # - Adds --max-time/--connect-timeout to prevent infinite curl hang
      # - Replaces sleep 5 with polling loop (async logger may need more time)
      # - Removes dry_run flag (not a supported API param — was triggering real evaluations)
      # - Secrets passed via env var, not inline GitHub expression (security pattern)
      # - 5xx → skip (logger likely never called if endpoint errored before reaching it)
      #
      # Gate state machine:
      #   HTTP 000 → Stack not running → SKIP (infra issue)
      #   HTTP 404 → Endpoint not yet implemented → SKIP with warning
      #   HTTP 5xx → Endpoint errored before logger → SKIP with warning
      #   HTTP 2xx → Endpoint ran → poll container JSONL → HARD gate
      env:
        SHARED_SECRET: ${{ env.PROXY_ENGINE_SHARED_SECRET }}
      run: |
        cd "${{ env.TEST_DIR }}"

        echo "Triggering evaluation to exercise the audit logger..."
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 30 --connect-timeout 5 \
          -X POST http://localhost:8001/api/v1/evaluate \
          -H "Content-Type: application/json" \
          -H "X-Shared-Secret: $SHARED_SECRET" \
          -d '{"symbol": "AAPL"}' 2>/dev/null)

        echo "Evaluate endpoint returned HTTP $HTTP_STATUS"

        if [ "$HTTP_STATUS" = "000" ] || [ "$HTTP_STATUS" = "404" ]; then
          echo "⚠️  WARNING: Gate SKIPPED — HTTP $HTTP_STATUS (stack not running or endpoint not yet implemented)."
          echo "   F04 detection requires /api/v1/evaluate to exist and return 2xx."
          exit 0
        fi

        if [[ "$HTTP_STATUS" =~ ^5 ]]; then
          echo "⚠️  WARNING: Gate SKIPPED — Endpoint errored (HTTP $HTTP_STATUS)."
          echo "   Logger was likely not reached. Cannot determine compliance state."
          exit 0
        fi

        # Endpoint returned 2xx: poll inside the container for the JSONL file.
        # CRITICAL: LocalJSONAuditLogger writes to /app/oss_audit_logs/ INSIDE the container.
        # docker-compose.oss.yml has no volume mount for audit_logs → host FS is invisible.
        # We use `docker compose exec` to check the container filesystem directly.

        # Guard: verify backend container is actually running before polling.
        # If the container crashed (OOM, Postgres timeout, Alembic failure), docker compose exec
        # would fail silently (stderr suppressed), wc -l would return 0, and the gate would
        # blame DummyAuditLogger — a misleading diagnosis that wastes debugging time.
        if ! docker compose -f docker-compose.oss.yml exec -T backend true 2>/dev/null; then
          echo "⚠️  WARNING: Backend container is not running (exec probe failed)."
          echo "   Gate SKIPPED — this is an infrastructure failure, not a compliance finding."
          echo "   Check container logs: docker compose logs backend"
          exit 0
        fi

        echo "Endpoint returned HTTP $HTTP_STATUS — polling container for JSONL (max 30s)..."
        TIMEOUT=30; ELAPSED=0; LOG_COUNT=0
        while [ "$LOG_COUNT" -eq 0 ] && [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          sleep 2
          ELAPSED=$((ELAPSED + 2))
          # Use grep -c instead of wc -l to count only lines containing actual filenames.
          # docker compose exec can emit CLI warnings/deprecations on stdout that would
          # inflate wc -l, causing a false-positive gate pass.
          LOG_COUNT=$(docker compose -f docker-compose.oss.yml exec -T backend \
            find /app/oss_audit_logs -name "audit_log_*.jsonl" -not -empty \
            2>/dev/null | grep -c "audit_log_")
          echo "  t=${ELAPSED}s: log files found = $LOG_COUNT"
        done

        if [ "$LOG_COUNT" -eq 0 ]; then
          echo "❌ COMPLIANCE GATE FAILED: No audit log in container after ${TIMEOUT}s."
          echo "   DummyAuditLogger is active or LocalJSONAuditLogger is not wired in runner.py."
          echo "   Fix: ensure runner.py passes LocalJSONAuditLogger to RoundTableEngine, not DummyAuditLogger."
          exit 1
        fi
        echo "✅ Compliance Gate PASSED: $LOG_COUNT audit log file(s) verified inside container."

    - name: "🧪 OSS Lock-In Tests (DSGVO + Network defaults)"
      if: github.repository == 'Autonomous-Asset-Management-Agents/Dev-Enviroment'
      # These tests are static file audits (read YAML/TS/MD from the repo).
      # They must run on the CI host — not inside the Docker container — so
      # parents[3] path resolution correctly finds the repo root.
      # --noconftest avoids importing backend dependencies (not needed here).
      run: |
        python -m pip install pytest allure-pytest --quiet
        python -m pytest tests/unit/test_oss_dsgvo_network_defaults.py \
               tests/unit/test_oss_compose_defaults.py \
               tests/unit/test_oss_hygiene_defaults.py \
          -v --tb=short --override-ini="addopts=" --noconftest -p no:warnings

    - name: Dump container logs on failure
      if: failure()
      run: |
        if [ -d "${{ env.TEST_DIR }}" ]; then
          cd "${{ env.TEST_DIR }}"
          docker compose -f docker-compose.oss.yml logs --tail=200 || true
        fi

    - name: Stop OSS Stack
      if: always()
      run: |
        if [ -d "${{ env.TEST_DIR }}" ]; then
          cd "${{ env.TEST_DIR }}"
          docker compose -f docker-compose.oss.yml down -v || true
        fi

  pr-size-warning:
    name: "📏 PR Size Warning (Soft Limit)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Check PR Size
        run: |
          LINES=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | grep -v 'package-lock.json' | awk '{add+=$1; del+=$2} END {print add+del+0}')
          if [ -n "$LINES" ] && [ "$LINES" -gt 300 ]; then
            echo "::warning::PR size ($LINES lines) exceeds the 300 lines soft limit. Please consider splitting the PR to improve review quality."
          fi

  # ── Native SQLite Boot Gate (OSS-4 / #1085) ──────────────────────────────
  # Phase 1 Local-First validation: boots the engine WITHOUT Docker,
  # PostgreSQL, or Redis. Uses SQLite + LocalStateClient only.
  # Validates the desktop/Electron end-user experience.
  test-native-sqlite-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "sqlite+aiosqlite:///./data/aaagents.db"
      REDIS_URL: ""
      ALPACA_API_KEY: ""
      ALPACA_SECRET_KEY: ""
      GEMINI_API_KEY: "ci-dummy-gemini-key"
      IS_CI: "true"

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Install dependencies (lightweight — no torch)
      run: |
        pip install --upgrade pip
        # Filter out heavy ML/torch dependencies to avoid downloading 2GB+ wheels and failing on standard ubuntu runners
        grep -vE "torch|stable-baselines3|sb3-contrib|lightgbm|scikit-learn|scipy|torchvision|torchaudio" requirements.oss.txt > requirements-light.txt
        pip install -r requirements-light.txt
        pip install aiosqlite pytest-asyncio pytest-anyio

    - name: "🗄️ Native SQLite Boot — Portability Tests"
      run: |
        python -m pytest \
          tests/unit/test_config_local_mode.py \
          tests/unit/test_database_bootstrap.py \
          tests/unit/test_session_sqlite_pragmas.py \
          tests/unit/test_cloud_logger_sqlite.py \
          tests/unit/test_user_wallet_store_orm.py \
          tests/unit/test_local_state_client.py \
          -v --tb=short --no-cov \
          --override-ini="addopts=" \
          -p no:warnings
