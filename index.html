<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Google Consent Mode v2 Default Settings (Must be first) -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('consent', 'default', {
            'ad_storage': 'denied',
            'ad_user_data': 'denied',
            'ad_personalization': 'denied',
            'analytics_storage': 'denied',
            'wait_for_update': 500
        });
        gtag('set', 'url_passthrough', true);
    </script>
    <!-- NOTE: Insert Consent Management Provider (CMP) Script here (e.g. Cookiebot or Usercentrics) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="canonical" href="https://aaagents.de/" />
    <title>AAAgents</title>
    <meta name="description" content="Open-source autonomous trading platform — multi-agent voting ensemble (≈500 per-symbol signal models, 12 weighted classifiers), on-prem inference, synchronous pre-trade compliance gate, and tamper-evident audit chain. Paper-trading by default." />
    <meta name="author" content="AAAgents" />
    <meta name="theme-color" content="#000000" />
    <!-- Live trading console / credential-entry surface — must not be search-indexed -->
    <meta name="robots" content="noindex, nofollow" />

    <meta property="og:image" content="https://aaagents.de/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AAAgents — autonomous AI trading platform" />

    <!-- Twitter -->
