[flake8]
# Max line length consistent with Black (120) and isort
max-line-length = 120

# Ignore whitespace-before-operator (E203) and line-break-before-binary-op (W503)
# which conflict with Black's formatting style.
extend-ignore = E203,W503

# Exclude generated / third-party directories
exclude =
    .git,
    __pycache__,
    pandas-ta,
    node_modules,
    .venv,
    venv,
    gui,
    models,
    scripts,
    *.egg-info,
    .eggs,
    dist,
    build

# Max cyclomatic complexity per function (warn, not block)
max-complexity = 15
