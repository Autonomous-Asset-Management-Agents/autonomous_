[flake8]
# ADR-CI-01: Flake8 hard gates — only block on real correctness issues.
# setup.cfg takes precedence over .flake8 in flake8 7.x config discovery.
# All flake8 config MUST live here.
max-line-length = 120
max-complexity = 50

# Pre-existing violations suppressed until Sprint backlog is cleared.
# DO NOT ADD NEW CODES — fix the code instead.
# ALWAYS BLOCKING (never add here): E722, E741, F821, W605
extend-ignore =
    # Black-compatible
    E203,
    W503,
    # Pre-existing style debt
    E127,
    E302,
    E306,
    E401,
    E402,
    E501,
    # Pre-existing import noise
    F401,
    F403,
    F405,
    F541,
    F811,
    F824,
    F841,
    # Pre-existing whitespace
    W191,
    W291,
    W293,
    # Cyclomatic complexity — tracked in Sprint backlog, not blocking
    C901,

# Exclude generated / third-party directories and vendored code
exclude =
    .git,
    __pycache__,
    pandas-ta,
    node_modules,
    .venv,
    venv,
    venv_new,
    gui,
    models,
    scripts,
    alembic,
    *.egg-info,
    .eggs,
    dist,
    build,

# These are ALWAYS blocking (never ignore):
# E711 comparison to None (== None instead of is None)
# E712 comparison to False
# E722 bare except
# E741 ambiguous variable name
# F821 undefined name
# W605 invalid escape sequence
