[isort]
# ADR-CI-01: isort configuration for AAAgents backend
# Pre-existing import order violations are tracked in Sprint-1 backlog.
# New files MUST comply with this configuration.
profile = black
line_length = 88
skip_glob =
    .venv/**,
    venv/**,
    venv_new/**,
    __pycache__/**,
    # Vendored libraries — never reformat
    pandas-ta/**,
    core/utils/pandas_ta_classic/**,
    core/utils/ta/**,
    # Alembic migrations — intentional import ordering (SQLAlchemy conventions)
    alembic/**,
